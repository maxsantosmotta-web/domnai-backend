name: Refine item 8 action plan

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/refine-item8-action-plan.yml

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Refine Plano de Ação Empresarial guidance
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/services/domnai_brain.py')
          source = path.read_text(encoding='utf-8')
          old = '    "Plano de Ação Empresarial": "Transforme o objetivo em ações priorizadas, responsáveis, prazos, recursos e indicadores.",'
          new = '    "Plano de Ação Empresarial": "Use todas as informações já fornecidas e não repita perguntas respondidas. Transforme o objetivo em ações priorizadas, responsáveis, prazos, recursos e indicadores. Quando o usuário informar dois volumes, metas ou quantidades, separe claramente o cenário conservador da meta ampliada, sem misturar os números. Quando houver comissões, bônus, custos, receitas ou projeções numéricas, apresente uma tabela objetiva e confira os cálculos. Destaque risco financeiro, capacidade de caixa e sustentabilidade antes de recomendar crescimento. Encerre com a ação prática mais importante para começar, sem pergunta genérica nem repetição da conclusão.",'
          if old not in source:
              raise SystemExit('Orientação atual do Plano de Ação Empresarial não encontrada exatamente uma vez.')
          if source.count(old) != 1:
              raise SystemExit(f'Orientação encontrada {source.count(old)} vezes; esperado 1.')
          source = source.replace(old, new, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Validate item 8 guidance
        run: |
          python -m compileall -q app/services/domnai_brain.py
          python - <<'PY'
          from app.services.domnai_brain import OPERATION_GUIDANCE, build_system_prompt

          guidance = OPERATION_GUIDANCE['Plano de Ação Empresarial']
          required = [
              'não repita perguntas respondidas',
              'cenário conservador',
              'meta ampliada',
              'tabela objetiva',
              'risco financeiro',
              'capacidade de caixa',
              'sustentabilidade',
              'ação prática mais importante',
              'sem pergunta genérica',
          ]
          missing = [item for item in required if item not in guidance]
          if missing:
              raise SystemExit(f'Regras ausentes: {missing}')
          prompt = build_system_prompt('Plano de Ação Empresarial')
          if guidance not in prompt:
              raise SystemExit('Orientação não chegou ao prompt ativo.')
          print('Item 8 validado no prompt ativo.')
          PY

      - name: Commit final source and remove temporary workflow
        run: |
          git rm .github/workflows/refine-item8-action-plan.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/services/domnai_brain.py
          git commit -m "fix(chat): completar orientação do plano de ação"
          git push origin main
