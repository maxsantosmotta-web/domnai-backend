name: Align Feedback Premium pattern

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/align-feedback-premium-pattern.yml

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/feedback-premium-standard-pattern
          fetch-depth: 0

      - name: Align Feedback with existing Premium pattern
        run: |
          python - <<'PY'
          from pathlib import Path

          access_path = Path('frontend/src/dashboard-access-control.js')
          access = access_path.read_text(encoding='utf-8')
          old = "const restrictedSystem = systemButton && (text.includes('Biblioteca') || text.includes('Lixeira'));"
          new = "const restrictedSystem = systemButton && (text.includes('Biblioteca') || text.includes('Lixeira') || text.includes('Feedback'));"
          if new not in access:
              if old not in access:
                  raise SystemExit('Regra central de bloqueio não encontrada')
              access = access.replace(old, new, 1)
          access_path.write_text(access, encoding='utf-8')

          feedback_path = Path('frontend/src/dashboard-feedback.js')
          feedback = feedback_path.read_text(encoding='utf-8')
          start = feedback.find('function showFeedbackPremiumNotice() {')
          if start != -1:
              end = feedback.find('\n\nfunction feedbackEscape', start)
              if end == -1:
                  raise SystemExit('Fim da notificação própria não encontrado')
              feedback = feedback[:start] + feedback[end + 2:]

          old_click = '''  button.addEventListener('click', async (event) => {
    event.preventDefault();
    event.stopPropagation();
    try {
      const allowed = await feedbackAccess(true);
      renderFeedbackMenuAccess(button, allowed);
      if (!allowed) {
        showFeedbackPremiumNotice();
        return;
      }
      openFeedbackPage();
    } catch (_error) {
      renderFeedbackMenuAccess(button, false);
      showFeedbackPremiumNotice();
    }
  });'''
          new_click = '''  button.addEventListener('click', async (event) => {
    event.preventDefault();
    event.stopPropagation();
    try {
      const allowed = await feedbackAccess(true);
      renderFeedbackMenuAccess(button, allowed);
      if (!allowed) return;
      openFeedbackPage();
    } catch (_error) {
      renderFeedbackMenuAccess(button, false);
    }
  });'''
          if new_click not in feedback:
              if old_click not in feedback:
                  raise SystemExit('Listener do Feedback não encontrado')
              feedback = feedback.replace(old_click, new_click, 1)
          feedback_path.write_text(feedback, encoding='utf-8')

          css_path = Path('frontend/src/dashboard-feedback.css')
          css = css_path.read_text(encoding='utf-8')
          marker = '/* Feedback bloqueado segue o padrão visual dos demais itens PREMIUM. */'
          if marker not in css:
              css = css.rstrip() + '''

/* Feedback bloqueado segue o padrão visual dos demais itens PREMIUM. */
.domnai-feedback-menu-button.is-premium-locked,
.domnai-feedback-menu-button.is-premium-locked:hover,
.domnai-feedback-menu-button.is-premium-locked:focus,
.domnai-feedback-menu-button.is-premium-locked:active {
  border-color: transparent !important;
  background: transparent !important;
  color: #ffffff !important;
  box-shadow: none !important;
}

.domnai-feedback-menu-button.is-premium-locked .domnai-feedback-menu-label {
  color: #ffffff !important;
}

.domnai-feedback-menu-button.is-premium-locked > span:first-child {
  color: #d8aa34 !important;
}
'''
          css_path.write_text(css, encoding='utf-8')
          PY

      - name: Validate frontend build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Commit aligned pattern
        run: |
          git rm .github/workflows/align-feedback-premium-pattern.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/dashboard-access-control.js frontend/src/dashboard-feedback.js frontend/src/dashboard-feedback.css
          git commit -m "fix(feedback): align Premium lock with validated pattern"
          git push origin HEAD:fix/feedback-premium-standard-pattern
