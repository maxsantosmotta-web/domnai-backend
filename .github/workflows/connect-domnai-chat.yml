name: Connect DomnAI Chat

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-chat:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Connect chat UI to backend
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('frontend/src/Dashboard.jsx')
          source = path.read_text(encoding='utf-8')

          source = source.replace(
              "  const [uploading, setUploading] = useState(false);\n",
              "  const [uploading, setUploading] = useState(false);\n  const [responding, setResponding] = useState(false);\n",
              1,
          )

          old_send = """  function sendMessage(event) {
            event.preventDefault();
            const text = draft.trim();
            if ((!text && attachments.length === 0) || uploading) return;

            setMessages((current) => [...current, {
              id: Date.now(),
              role: 'user',
              text,
              attachments: [...attachments],
            }]);
            setDraft('');
            setAttachments([]);
            setPlusOpen(false);
          }
          """

          new_send = """  async function sendMessage(event) {
            event.preventDefault();
            const text = draft.trim();
            if ((!text && attachments.length === 0) || uploading || responding) return;

            const sentAttachments = [...attachments];
            const userMessage = {
              id: Date.now(),
              role: 'user',
              text,
              attachments: sentAttachments,
            };
            const history = messages
              .filter((message) => ['user', 'assistant'].includes(message.role) && message.text?.trim())
              .slice(-40)
              .map((message) => ({ role: message.role, content: message.text.trim() }));
            const operationName = operations.find((item) => item.id === activeOperation)?.name || null;
            const messageForApi = text || `Analise os arquivos anexados: ${sentAttachments.map((item) => item.name).join(', ')}`;

            setMessages((current) => [...current, userMessage]);
            setDraft('');
            setAttachments([]);
            setPlusOpen(false);
            setResponding(true);

            try {
              const response = await authorizedFetch('/api/chat/respond', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  message: messageForApi,
                  operation: operationName,
                  history,
                }),
              });
              const payload = await response.json().catch(() => ({}));
              if (!response.ok) {
                throw new Error(payload.detail || 'Não foi possível obter a resposta do DomnAI.');
              }
              setMessages((current) => [...current, {
                id: Date.now() + 1,
                role: 'assistant',
                text: payload.reply || 'O DomnAI não retornou uma resposta em texto.',
                attachments: [],
              }]);
            } catch (error) {
              setMessages((current) => [...current, {
                id: Date.now() + 1,
                role: 'assistant',
                text: error.message || 'Não foi possível concluir a análise. Tente novamente.',
                attachments: [],
                isError: true,
              }]);
            } finally {
              setResponding(false);
            }
          }
          """

          if old_send not in source:
              if "async function sendMessage(event)" not in source:
                  raise SystemExit('Bloco sendMessage original não encontrado.')
          else:
              source = source.replace(old_send, new_send, 1)

          source = source.replace(
              "<article className={`chat-message ${message.role}`} key={message.id}>",
              "<article className={`chat-message ${message.role}${message.isError ? ' error' : ''}`} key={message.id}>",
          )

          messages_close = """              {visibleMessages.map((message) => <article className={`chat-message ${message.role}${message.isError ? ' error' : ''}`} key={message.id}><span className=\"message-author\">{message.role === 'assistant' ? 'DomnAI' : 'Você'}</span>{message.text ? <p>{message.text}</p> : null}{(message.attachments || []).length ? <div className=\"message-attachments\">"""
          if messages_close not in source:
              pass

          source = source.replace(
              "              {visibleMessages.map((message) => <article className={`chat-message ${message.role}${message.isError ? ' error' : ''}`} key={message.id}><span className=\"message-author\">{message.role === 'assistant' ? 'DomnAI' : 'Você'}</span>{message.text ? <p>{message.text}</p> : null}{(message.attachments || []).length ? <div className=\"message-attachments\">{message.attachments.map((item) => item.type === 'image' && item.previewUrl ? <figure className=\"chat-image-native\" key={item.id}><img src={item.previewUrl} alt={item.name} /><figcaption><span>{item.name}</span><div><button type=\"button\" onClick={() => openAttachment(item)}>Abrir imagem</button><button type=\"button\" className=\"danger\" onClick={() => deleteAttachment(item)}>Excluir</button></div></figcaption></figure> : <div className=\"chat-native-file\" key={item.id}>{renderNativeFile(item, () => openAttachment(item))}<button type=\"button\" className=\"native-delete-button\" onClick={() => deleteAttachment(item)}>Excluir</button></div>)}</div> : null}</article>)}\n",
              "              {visibleMessages.map((message) => <article className={`chat-message ${message.role}${message.isError ? ' error' : ''}`} key={message.id}><span className=\"message-author\">{message.role === 'assistant' ? 'DomnAI' : 'Você'}</span>{message.text ? <p>{message.text}</p> : null}{(message.attachments || []).length ? <div className=\"message-attachments\">{message.attachments.map((item) => item.type === 'image' && item.previewUrl ? <figure className=\"chat-image-native\" key={item.id}><img src={item.previewUrl} alt={item.name} /><figcaption><span>{item.name}</span><div><button type=\"button\" onClick={() => openAttachment(item)}>Abrir imagem</button><button type=\"button\" className=\"danger\" onClick={() => deleteAttachment(item)}>Excluir</button></div></figcaption></figure> : <div className=\"chat-native-file\" key={item.id}>{renderNativeFile(item, () => openAttachment(item))}<button type=\"button\" className=\"native-delete-button\" onClick={() => deleteAttachment(item)}>Excluir</button></div>)}</div> : null}</article>)}\n              {responding ? <article className=\"chat-message assistant analyzing\"><span className=\"message-author\">DomnAI</span><p>DomnAI está analisando...</p></article> : null}\n",
              1,
          )

          source = source.replace(
              "placeholder={uploading ? 'Salvando na biblioteca...' : 'Digite sua mensagem...'} rows=\"3\" disabled={uploading} /><button type=\"submit\" className=\"send-message-button\" aria-label=\"Enviar mensagem\" disabled={uploading}>➤</button>",
              "placeholder={uploading ? 'Salvando na biblioteca...' : responding ? 'Aguarde a resposta do DomnAI...' : 'Digite sua mensagem...'} rows=\"3\" disabled={uploading || responding} /><button type=\"submit\" className=\"send-message-button\" aria-label=\"Enviar mensagem\" disabled={uploading || responding}>➤</button>",
              1,
          )

          path.write_text(source, encoding='utf-8')
          PY

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/Dashboard.jsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(chat): connect dashboard to DomnAI intelligence endpoint"
          git push
