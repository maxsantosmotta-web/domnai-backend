name: Apply item 4 under 10 seconds

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-item4-under10.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply source changes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/services/orchestrated_brain.py')
          source = path.read_text(encoding='utf-8')
          marker = '''    api_key = os.getenv("OPENAI_API_KEY", "").strip()
    if not api_key:
'''
          replacement = '''    # The orchestration plan is only consumed to select a specialized engine.
    # General conversation goes directly to the main generator instead of paying
    # for a sequential planning request whose result would otherwise be discarded.
    if _specialized_engine({}, operation, message) is None:
        base_result = generate_metered_response(
            message=message,
            history=history,
            operation=operation,
            attachments=safe_attachments,
            diagnosis_state=diagnosis_state,
        )
        return MeteredBrainResult(
            text=base_result.text,
            provider=f"direct:{base_result.provider}",
            model=base_result.model,
            input_tokens=base_result.input_tokens,
            output_tokens=base_result.output_tokens,
            cached_input_tokens=base_result.cached_input_tokens,
            diagnosis_state=base_result.diagnosis_state,
            timings={"orchestrator_ms": 0, **(base_result.timings or {})},
        )

    api_key = os.getenv("OPENAI_API_KEY", "").strip()
    if not api_key:
'''
          if replacement not in source:
              if marker not in source:
                  raise SystemExit('Ponto do orquestrador não encontrado')
              source = source.replace(marker, replacement, 1)
          path.write_text(source, encoding='utf-8')

          path = Path('app/services/metered_brain.py')
          source = path.read_text(encoding='utf-8')
          marker = '''    fallback = sanitize_diagnosis_state(prior_state or {}, operation)
    try:
'''
          replacement = '''    fallback = sanitize_diagnosis_state(prior_state or {}, operation)
    if not operation and not prior_state and not attachments:
        return fallback, {}
    try:
'''
          if replacement not in source:
              if marker not in source:
                  raise SystemExit('Ponto da memória não encontrado')
              source = source.replace(marker, replacement, 1)
          path.write_text(source, encoding='utf-8')

          path = Path('app/services/artifact_decision.py')
          source = path.read_text(encoding='utf-8')
          helper_marker = 'def decide_artifact(\n'
          helper = '''def _requires_artifact_decision(message: str, operation: str | None, history: list[dict], answer: str) -> bool:
    normalized = " ".join(str(message or "").casefold().split())
    explicit_markers = (
        "pdf", "planilha", "xlsx", "excel", "csv", "arquivo", "documento",
        "baixar", "download", "abrir arquivo", "manda o link", "envia o link",
        "salvar na biblioteca", "gere um relatório", "crie um relatório",
    )
    if any(marker in normalized for marker in explicit_markers):
        return True
    recent_text = " ".join(str(item.get("content") or "").casefold() for item in history[-4:])
    if any(marker in recent_text for marker in ("posso organizar", "salvar na sua biblioteca", "pdf profissional", "planilha editável")):
        return True
    return bool(operation and len(str(answer or "").strip()) >= 1000)


'''
          if '_requires_artifact_decision' not in source:
              if helper_marker not in source:
                  raise SystemExit('Ponto da decisão de arquivo não encontrado')
              source = source.replace(helper_marker, helper + helper_marker, 1)
          marker = '''    api_key = os.getenv("OPENAI_API_KEY", "").strip()
    if not api_key:
        return dict(_NONE)
'''
          replacement = '''    if not _requires_artifact_decision(message, operation, history, answer):
        return dict(_NONE)

    api_key = os.getenv("OPENAI_API_KEY", "").strip()
    if not api_key:
        return dict(_NONE)
'''
          if replacement not in source:
              if marker not in source:
                  raise SystemExit('Corte da decisão de arquivo não encontrado')
              source = source.replace(marker, replacement, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Add focused tests
        run: |
          cat > tests/test_item4_performance_routing.py <<'PY'
          from unittest.mock import patch

          from app.services.artifact_decision import _requires_artifact_decision
          from app.services.metered_brain import MeteredBrainResult, _update_diagnosis_memory
          from app.services.orchestrated_brain import generate_orchestrated_response


          def test_general_message_skips_orchestrator_request():
              generated = MeteredBrainResult(
                  text='Resposta objetiva', provider='openai-memory', model='test',
                  input_tokens=10, output_tokens=5, diagnosis_state=None,
                  timings={'generation_ms': 20},
              )
              with patch('app.services.orchestrated_brain.generate_metered_response', return_value=generated) as generator, \
                   patch('app.services.orchestrated_brain._openai_request') as orchestrator:
                  result = generate_orchestrated_response(
                      message='Como posso organizar melhor meu dia?', history=[], operation=None,
                      attachments=[], diagnosis_state=None,
                  )
              generator.assert_called_once()
              orchestrator.assert_not_called()
              assert result.timings['orchestrator_ms'] == 0


          def test_memory_ai_is_skipped_without_diagnostic_context():
              with patch('app.services.metered_brain._openai_request') as request:
                  state, usage = _update_diagnosis_memory(
                      api_key='key', model='model', operation=None, prior_state=None,
                      message='Pergunta comum', final_text='Resposta', attachments=[],
                  )
              request.assert_not_called()
              assert usage == {}
              assert isinstance(state, dict)


          def test_short_common_answer_skips_artifact_ai():
              assert not _requires_artifact_decision(
                  'Como organizar meu dia?', None, [], 'Use três prioridades e revise no fim do dia.'
              )


          def test_explicit_pdf_request_keeps_artifact_decision():
              assert _requires_artifact_decision('Crie um PDF desse plano', None, [], 'Plano concluído.')
          PY

      - name: Run tests
        run: |
          python -m pytest -q tests/test_item4_performance_routing.py
          python -m pytest -q tests/test_labor_termination.py tests/test_orchestrated_brain.py

      - name: Commit validated source and self-remove
        run: |
          git rm .github/workflows/apply-item4-under10.yml
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add app/services/orchestrated_brain.py app/services/metered_brain.py app/services/artifact_decision.py tests/test_item4_performance_routing.py
          git commit -m "perf(chat): eliminar chamadas sequenciais inúteis"
          git push origin main
