name: Consolidate capability guard

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/consolidate-capability-guard.yml

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/consolidate-capability-guard
          fetch-depth: 0

      - name: Apply current production capability guard exactly once
        run: |
          sudo mkdir -p /app
          sudo ln -sfn "$GITHUB_WORKSPACE/app" /app/app
          python scripts/guard_domnai_capabilities.py

      - name: Remove runtime patch from Docker build
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Dockerfile')
          source = path.read_text(encoding='utf-8')
          source = source.replace('COPY scripts/guard_domnai_capabilities.py /tmp/guard_domnai_capabilities.py\n', '', 1)
          source = source.replace('    && python /tmp/guard_domnai_capabilities.py \\\n', '', 1)
          if '/tmp/guard_domnai_capabilities.py' in source:
              raise SystemExit('Dockerfile ainda executa guard_domnai_capabilities.py')
          path.write_text(source, encoding='utf-8')
          PY

      - name: Validate consolidated protection
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('app/services/metered_brain.py').read_text(encoding='utf-8')
          required = [
              'from app.services.capability_guard import apply_capability_guard',
              'text=apply_capability_guard(text)',
              'text=apply_capability_guard(preflight_text)',
              '    final_text = apply_capability_guard(final_text)',
              '"max_output_tokens": 350',
              '"max_output_tokens": 700',
              '"max_output_tokens": 1400',
          ]
          missing = [marker for marker in required if marker not in source]
          if missing:
              raise SystemExit(f'Proteção incompleta: {missing}')

          forbidden = [
              '"max_output_tokens": 500',
              '"max_output_tokens": 1200',
              '"max_output_tokens": 2400',
          ]
          present = [marker for marker in forbidden if marker in source]
          if present:
              raise SystemExit(f'Limites antigos ainda presentes: {present}')

          unique = required[:4]
          duplicates = {marker: source.count(marker) for marker in unique if source.count(marker) != 1}
          if duplicates:
              raise SystemExit(f'Proteção duplicada ou ausente: {duplicates}')
          PY

      - name: Run official backend validation
        env:
          PYTHONPATH: .
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m compileall -q app
          python -c "from app.services.capability_guard import apply_capability_guard; print('guard import ok')"
          python -c "from app.services.metered_brain import generate_metered_response; print('metered import ok')"
          pytest -vv --tb=short tests/test_labor_termination.py
          pytest -vv --tb=short tests/test_orchestrated_brain.py

      - name: Commit consolidated source
        run: |
          git rm .github/workflows/consolidate-capability-guard.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile app/services/metered_brain.py
          git commit -m "refactor(chat): consolidate capability guard in source"
          git push origin HEAD:fix/consolidate-capability-guard
