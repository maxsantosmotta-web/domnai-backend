name: Backend unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install application and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify imports
        run: |
          python -c "from app.services.labor_termination import calculate; print('labor import ok')"
          python -c "from app.services.orchestrated_brain import generate_orchestrated_response; print('orchestrator import ok')"
          python -c "from app.domnai_core import ArtifactAwareConversationEngine, ArtifactCoordinator, ArtifactIntent, ArtifactGenerationAuthorization, ArtifactService, BinaryArtifactService, InMemoryArtifactStore, PostgresArtifactStore, ContextMemoryManager, MemoryScope, ConversationEngine, DomnAICoreSettings, OpenAIResponsesProvider, PostgresMemoryStore, ToolPolicy, ToolTimeoutError, build_builtin_tool_registry, build_domnai_core_runtime; print('new core import ok')"
          python -c "from app.api.domnai_core_preview import router; print('preview route import ok')"

      - name: Run labor tests
        run: pytest -vv --tb=short tests/test_labor_termination.py

      - name: Run orchestrator tests
        run: pytest -vv --tb=short tests/test_orchestrated_brain.py

      - name: Run core foundation and capabilities
        run: pytest -vv --tb=short tests/test_domnai_core_foundation.py tests/test_domnai_core_capabilities.py

      - name: Run core attachments and postgres
        run: pytest -vv --tb=short tests/test_domnai_core_tools_attachments.py tests/test_domnai_core_postgres.py

      - name: Run core OpenAI tool tests
        run: pytest -vv --tb=short tests/test_domnai_core_openai_tools.py

      - name: Run core composition tests
        run: pytest -vv --tb=short tests/test_domnai_core_composition.py

      - name: Run phase 2 builtin tool tests
        run: pytest -vv --tb=short tests/test_domnai_core_builtin_tools.py

      - name: Run phase 2 policy and multi-step tests
        run: pytest -vv --tb=short tests/test_domnai_core_tool_policies.py

      - name: Run phase 2 completion tests
        run: pytest -vv --tb=short tests/test_domnai_core_phase2_completion.py

      - name: Run phase 3 contextual memory tests
        run: pytest -vv --tb=short tests/test_domnai_core_context_memory.py

      - name: Run phase 3 completion tests
        run: pytest -vv --tb=short tests/test_domnai_core_phase3_memory_completion.py

      - name: Run phase 4 artifact foundation tests
        run: pytest -vv --tb=short tests/test_domnai_core_artifacts.py

      - name: Run phase 4 binary and persistence tests
        run: pytest -vv --tb=short tests/test_domnai_core_phase4_binary_persistence.py

      - name: Run phase 4 completion tests
        run: pytest -vv --tb=short tests/test_domnai_core_phase4_completion.py
