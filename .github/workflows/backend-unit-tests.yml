name: Backend unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install application and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify imports
        run: |
          python -c "from app.services.labor_termination import calculate; print('labor import ok')"
          python -c "from app.services.orchestrated_brain import generate_orchestrated_response; print('orchestrator import ok')"
          python -c "from app.domnai_core import AttachmentPreparer, ConversationEngine, ConversationRequest, OpenAIResponsesProvider, PostgresMemoryStore, ToolExecutor; print('new core import ok')"
          python -c "from app.api.domnai_core_preview import router; print('preview route import ok')"

      - name: Run labor tests
        run: pytest -vv --tb=short tests/test_labor_termination.py

      - name: Run orchestrator tests
        run: pytest -vv --tb=short tests/test_orchestrated_brain.py

      - name: Run new core tests
        run: pytest -vv --tb=short tests/test_domnai_core_foundation.py tests/test_domnai_core_capabilities.py tests/test_domnai_core_tools_attachments.py tests/test_domnai_core_postgres.py tests/test_domnai_core_openai_tools.py
